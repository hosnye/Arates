# Render Blueprint — free hosting for the Tarabish app.
# Deploy: push this repo to GitHub, then on https://render.com
#   New + → Blueprint → pick this repo. Render reads this file automatically.
# After the first deploy, set GEMINI_API_KEY in the service's Environment tab.
services:
  - type: web
    name: tarabish
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    region: frankfurt        # closest free region; change if you like (oregon / singapore / ohio)
    healthCheckPath: /
    autoDeploy: true         # redeploys on every push to the connected branch
    envVars:
      - key: NODE_ENV
        value: production
      - key: GEMINI_API_KEY  # set the real value in the Render dashboard (kept secret)
        sync: false
